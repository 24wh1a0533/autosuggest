<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/beinginfinity.css">
</head>
<body>

<div class="box">

    <div class="status">
        <span>● online</span>
        <span>○ - ms</span>
    </div>

    <h1>BeingInfinity</h1>

    <p>
        One million phrases. Four algorithms.
        Prefix Based Auto Suggest.
    </p>

    <input type="text" id="search" placeholder="Start typing to search phrase...">

    <div id="suggestions"></div>

</div>

<script>
const phrases = [
    "html",
    "css",
    "javascript",
    "java",
    "python",
    "react",
    "nodejs"
];

const search = document.getElementById("search");
const suggestions = document.getElementById("suggestions");

search.addEventListener("keyup", function () {

    let value = search.value.toLowerCase();
    suggestions.innerHTML = "";

    if(value === "") return;

    phrases.forEach(function(item){

        if(item.startsWith(value)){
            let p = document.createElement("p");
            p.innerText = item;

            p.onclick = function(){
                search.value = item;
                suggestions.innerHTML = "";
            };

            suggestions.appendChild(p);
        }
    });
});
</script>

</body>
</html>
